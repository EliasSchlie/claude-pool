name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.23"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify Go version not bumped
        run: |
          ACTUAL=$(grep '^go ' go.mod | awk '{print $2}')
          if [ "$ACTUAL" != "$GO_VERSION" ]; then
            echo "❌ go.mod says 'go $ACTUAL' but expected 'go $GO_VERSION'"
            echo "A dependency likely bumped the Go version. Downgrade the dep or update GO_VERSION in ci.yml."
            exit 1
          fi
          echo "✅ Go version pinned at $GO_VERSION"

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        run: make build
